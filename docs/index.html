<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>模拟交易平台</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --red: #f85149;
}
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 7px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
.logo { font-size: 13px; color: var(--accent); font-weight: 700; white-space: nowrap; }
.sym-tabs { display: flex; gap: 3px; flex-wrap: wrap; }
.sym-tab { padding: 3px 9px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); cursor: pointer; font-size: 11px; }
.sym-tab.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
.price-wrap { margin-left: auto; text-align: right; line-height: 1.3; }
.live-price { font-size: 18px; font-weight: 700; }
.live-price.up { color: var(--green); } .live-price.down { color: var(--red); }
.sub-info { font-size: 10px; color: var(--muted); }
.ws-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); display: inline-block; }
.ws-dot.on { background: var(--green); }

/* Timeframe bar */
.tf-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 5px 12px; display: flex; gap: 3px; flex-wrap: wrap; flex-shrink: 0; }
.tf-btn { padding: 3px 9px; border-radius: 3px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 11px; }
.tf-btn.active { background: #1f6feb22; color: var(--accent); font-weight: 600; }
.tf-btn:hover:not(.active) { color: var(--text); }

/* Layout */
.main { display: flex; flex: 1; overflow: hidden; }
#chart-wrap { flex: 1; min-width: 0; position: relative; }
.loading-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #0d111788; z-index: 10; font-size: 13px; color: var(--muted); }

/* Right panel */
.panel { width: 290px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
@media (max-width: 680px) {
  .main { flex-direction: column; }
  #chart-wrap { height: 42vh; flex: none; }
  .panel { width: 100%; border-left: none; border-top: 1px solid var(--border); flex: 1; }
  .tf-bar { padding: 4px 8px; }
}
.tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab { flex: 1; padding: 8px; text-align: center; font-size: 12px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-body { flex: 1; overflow-y: auto; padding: 11px; }

/* Form */
.fg { margin-bottom: 9px; }
label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 3px; }
input, select { width: 100%; padding: 6px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 12px; outline: none; }
input:focus, select:focus { border-color: var(--accent); }
.btn-row { display: flex; gap: 7px; margin-top: 12px; }
.btn { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-buy { background: #238636; color: #fff; }
.btn-sell { background: #da3633; color: #fff; }
.btn-sm { width: 100%; padding: 5px; background: var(--border); color: var(--muted); border: none; border-radius: 5px; cursor: pointer; font-size: 11px; margin-top: 7px; }

/* Stats */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 12px; }
.stat { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 8px; }
.stat .lbl { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
.stat .val { font-size: 14px; font-weight: 700; }
.pos { color: var(--green); } .neg { color: var(--red); }

.sec-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 9px 0 4px; }
.pos-row, .ord-row { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 6px 8px; margin-bottom: 4px; font-size: 11px; }
.ord-row { display: flex; justify-content: space-between; align-items: center; }
.xbtn { background: none; border: 1px solid var(--red); color: var(--red); border-radius: 3px; padding: 1px 5px; cursor: pointer; font-size: 10px; }
.empty { color: var(--muted); font-size: 12px; text-align: center; padding: 14px 0; }
.hist-row { font-size: 11px; padding: 5px 0; border-bottom: 1px solid #21262d; display: flex; gap: 5px; align-items: center; }

#toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); padding: 8px 16px; border-radius: 7px; font-size: 12px; display: none; z-index: 999; color: #fff; white-space: nowrap; }
</style>
</head>
<body>

<header>
  <div class="logo">📈 模拟交易</div>
  <div class="sym-tabs" id="symTabs"></div>
  <div class="price-wrap">
    <span class="ws-dot" id="wsDot"></span>
    <span class="live-price" id="livePrice">--</span>
    <br>
    <span class="sub-info" id="subInfo">连接中...</span>
  </div>
</header>

<!-- 时间周期切换 -->
<div class="tf-bar" id="tfBar"></div>

<div class="main">
  <div id="chart-wrap">
    <div class="loading-overlay" id="loadingOverlay">加载K线数据...</div>
  </div>

  <div class="panel">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('order',this)">下单</div>
      <div class="tab" onclick="switchTab('account',this)">账户</div>
      <div class="tab" onclick="switchTab('history',this)">记录</div>
    </div>

    <div class="tab-body" id="pane-order">
      <div class="fg">
        <label>类型</label>
        <select id="oType" onchange="togglePriceField()">
          <option value="limit">限价单</option>
          <option value="market">市价单</option>
        </select>
      </div>
      <div class="fg" id="priceField">
        <label>价格 (USDT/USDC)</label>
        <input id="oPrice" type="number" placeholder="挂单价格" step="0.01">
      </div>
      <div class="fg">
        <label>数量</label>
        <input id="oSize" type="number" placeholder="0.001" step="0.001">
      </div>
      <div class="fg">
        <label>止盈价（可选）</label>
        <input id="oTp" type="number" placeholder="触达自动平仓" step="0.01">
      </div>
      <div class="fg">
        <label>止损价（可选）</label>
        <input id="oSl" type="number" placeholder="触达止损" step="0.01">
      </div>
      <div class="btn-row">
        <button class="btn btn-buy" onclick="placeOrder('buy')">买 / 做多</button>
        <button class="btn btn-sell" onclick="placeOrder('sell')">卖 / 做空</button>
      </div>
      <button class="btn-sm" onclick="resetAccount()">⚠ 重置账户</button>
    </div>

    <div class="tab-body" id="pane-account" style="display:none">
      <div class="stat-grid" id="statGrid"></div>
      <div class="sec-title">持仓</div><div id="posDiv"></div>
      <div class="sec-title">挂单</div><div id="ordDiv"></div>
    </div>

    <div class="tab-body" id="pane-history" style="display:none">
      <div id="histDiv"></div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const SYMBOLS  = ['BTCUSDC','BTCUSDT','ETHUSDC','ETHUSDT','SOLUSDT','BNBUSDT'];
const TIMEFRAMES = [
  { label:'1分',  interval:'1m'  },
  { label:'3分',  interval:'3m'  },
  { label:'5分',  interval:'5m'  },
  { label:'15分', interval:'15m' },
  { label:'30分', interval:'30m' },
  { label:'1小时',interval:'1h'  },
  { label:'2小时',interval:'2h'  },
  { label:'4小时',interval:'4h'  },
  { label:'8小时',interval:'8h'  },
  { label:'1天',  interval:'1d'  },
  { label:'1周',  interval:'1w'  },
];
const INITIAL_BALANCE = 100_000;
const TAKER_FEE = 0.0005, MAKER_FEE = 0.0002, SLIPPAGE = 0.0005;

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let curSym = 'BTCUSDC';
let curTf  = '1m';
let prices = {}, prevPrices = {};
let ws, wsReady = false;
let chart, candleSeries;
// live candle buffer (current incomplete candle per symbol per tf)
const liveCandle = {}; // `${sym}_${tf}` -> {time,open,high,low,close}

// ══════════════════════════════════════════
// CHART
// ══════════════════════════════════════════
function initChart() {
  const el = document.getElementById('chart-wrap');
  chart = LightweightCharts.createChart(el, {
    layout: { background:{ color:'#0d1117' }, textColor:'#8b949e' },
    grid:   { vertLines:{ color:'#21262d' }, horzLines:{ color:'#21262d' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    timeScale: { timeVisible:true, secondsVisible: curTf==='1m', borderColor:'#30363d' },
    rightPriceScale: { borderColor:'#30363d' },
  });
  candleSeries = chart.addCandlestickSeries({
    upColor:'#3fb950', downColor:'#f85149',
    borderUpColor:'#3fb950', borderDownColor:'#f85149',
    wickUpColor:'#3fb950', wickDownColor:'#f85149',
  });
  new ResizeObserver(() => chart.resize(el.clientWidth, el.clientHeight)).observe(el);
}

// ══════════════════════════════════════════
// FETCH HISTORICAL KLINES (Binance REST API)
// ══════════════════════════════════════════
async function loadKlines(sym, interval) {
  document.getElementById('loadingOverlay').style.display = 'flex';
  try {
    // Try USDC endpoint, fallback to USDT
    const url = `https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${interval}&limit=500`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    const raw = await res.json();

    const data = raw.map(k => ({
      time:  Math.floor(k[0] / 1000),
      open:  parseFloat(k[1]),
      high:  parseFloat(k[2]),
      low:   parseFloat(k[3]),
      close: parseFloat(k[4]),
    }));

    candleSeries.setData(data);
    chart.timeScale().fitContent();

    // seed current price from last candle
    if (data.length) {
      const last = data[data.length - 1];
      prices[sym] = last.close;
      // init live candle buffer
      liveCandle[`${sym}_${interval}`] = { ...last };
      updatePriceDisplay(sym, last.close);
    }
  } catch(e) {
    console.error('klines fetch error', e);
  }
  document.getElementById('loadingOverlay').style.display = 'none';
}

// ══════════════════════════════════════════
// WEBSOCKET — Binance (ticker + kline stream)
// ══════════════════════════════════════════
function buildStreams() {
  const sl = curSym.toLowerCase();
  // subscribe all symbols ticker for price + current sym kline
  const streams = SYMBOLS.map(s => `${s.toLowerCase()}@ticker`);
  streams.push(`${sl}@kline_${curTf}`);
  return streams.join('/');
}

function connectWS() {
  if (ws) { ws.onclose = null; ws.close(); }
  const url = `wss://stream.binance.com:9443/stream?streams=${buildStreams()}`;
  ws = new WebSocket(url);
  ws.onopen = () => {
    wsReady = true;
    document.getElementById('wsDot').className = 'ws-dot on';
  };
  ws.onclose = () => {
    wsReady = false;
    document.getElementById('wsDot').className = 'ws-dot';
    setTimeout(connectWS, 2000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    const d = msg.data || {};
    const stream = msg.stream || '';

    // 24h ticker — most accurate price (matches Binance app)
    if (stream.includes('@ticker')) {
      const sym = d.s;
      const price = parseFloat(d.c); // last price
      prevPrices[sym] = prices[sym];
      prices[sym] = price;
      checkOrders(sym, price, price, price);
      if (sym === curSym) updatePriceDisplay(sym, price);
    }

    // kline — update chart candle
    if (stream.includes('@kline')) {
      const k = d.k;
      const sym = k.s;
      const key = `${sym}_${k.i}`;
      const candle = {
        time:  Math.floor(k.t / 1000),
        open:  parseFloat(k.o),
        high:  parseFloat(k.h),
        low:   parseFloat(k.l),
        close: parseFloat(k.c),
      };
      liveCandle[key] = candle;
      if (sym === curSym && k.i === curTf) {
        candleSeries.update(candle);
        // also use for order matching with wick precision
        checkOrders(sym, candle.close, candle.high, candle.low);
      }
    }
  };
}

function updatePriceDisplay(sym, price) {
  const prev = prevPrices[sym];
  const el = document.getElementById('livePrice');
  el.textContent = '$' + price.toLocaleString('en', { minimumFractionDigits:2, maximumFractionDigits:2 });
  el.className = 'live-price' + (prev && price > prev ? ' up' : prev && price < prev ? ' down' : '');
  document.getElementById('subInfo').textContent = `${sym} · 实时`;
}

// ══════════════════════════════════════════
// SYMBOL & TIMEFRAME SWITCH
// ══════════════════════════════════════════
function buildSymTabs() {
  document.getElementById('symTabs').innerHTML = SYMBOLS.map(s => {
    const label = s.replace('USDC','/C').replace('USDT','/T');
    return `<div class="sym-tab${s===curSym?' active':''}" onclick="switchSym('${s}')">${label}</div>`;
  }).join('');
}

function buildTfBar() {
  document.getElementById('tfBar').innerHTML = TIMEFRAMES.map(tf =>
    `<button class="tf-btn${tf.interval===curTf?' active':''}" onclick="switchTf('${tf.interval}')">${tf.label}</button>`
  ).join('');
}

async function switchSym(sym) {
  curSym = sym;
  buildSymTabs();
  await loadKlines(sym, curTf);
  connectWS(); // reconnect with new symbol stream
}

async function switchTf(interval) {
  curTf = interval;
  buildTfBar();
  // update secondsVisible
  chart.applyOptions({ timeScale: { secondsVisible: interval === '1m' } });
  await loadKlines(curSym, interval);
  connectWS(); // reconnect with new kline stream
}

// ══════════════════════════════════════════
// MATCHING ENGINE (穿针 + 滑点)
// ══════════════════════════════════════════
function applySlippage(price, side, size) {
  const impact = SLIPPAGE + (size / 10) * 0.0001;
  return side === 'buy' ? price * (1 + impact) : price * (1 - impact);
}

function checkOrders(sym, price, high, low) {
  const acc = getAccount();
  let changed = false;
  const toFill = [];

  for (const o of acc.orders) {
    if (o.symbol !== sym) continue;
    if (o.type === 'limit') {
      if (o.side === 'buy'  && low  <= o.price) toFill.push({ o, fp: applySlippage(o.price,'buy',o.size),  fee: MAKER_FEE });
      if (o.side === 'sell' && high >= o.price) toFill.push({ o, fp: applySlippage(o.price,'sell',o.size), fee: MAKER_FEE });
    } else if (o.type === 'market') {
      toFill.push({ o, fp: applySlippage(price, o.side, o.size), fee: TAKER_FEE });
    }
    // TP
    if (o.tp) {
      const tp = o.tp;
      if ((o.side==='buy'&&high>=tp)||(o.side==='sell'&&low<=tp)) {
        const co = {...o, side:o.side==='buy'?'sell':'buy', price:tp, type:'limit', tp:null, sl:null};
        toFill.push({ o:co, fp:tp, fee:MAKER_FEE, closeOf:o.id });
      }
    }
    // SL
    if (o.sl) {
      const sl = o.sl;
      if ((o.side==='buy'&&low<=sl)||(o.side==='sell'&&high>=sl)) {
        const co = {...o, side:o.side==='buy'?'sell':'buy', price:sl, type:'market', tp:null, sl:null};
        toFill.push({ o:co, fp:applySlippage(sl,co.side,o.size), fee:TAKER_FEE, closeOf:o.id });
      }
    }
  }

  for (const { o, fp, fee, closeOf } of toFill) {
    fillOrder(acc, o, fp, fee);
    if (closeOf) acc.orders = acc.orders.filter(x => x.id !== closeOf);
    changed = true;
    toast(`✅ ${o.side==='buy'?'买入':'卖出'} ${o.symbol} ${o.size} @ $${fp.toFixed(2)}`);
  }
  if (changed) { saveAccount(acc); if (activeTab==='account') renderAccount(); }
}

function fillOrder(acc, o, fp, feeRate) {
  const cost = fp * o.size, fee = cost * feeRate, sym = o.symbol;
  if (o.side === 'buy') {
    acc.balance -= cost + fee;
    if (!acc.positions[sym]) acc.positions[sym] = { size:0, entryPrice:0, side:'long' };
    const p = acc.positions[sym];
    const tot = p.size + o.size;
    p.entryPrice = (p.size * p.entryPrice + o.size * fp) / tot;
    p.size = tot; p.side = 'long';
  } else {
    if (acc.positions[sym]?.size > 0) {
      const p = acc.positions[sym];
      acc.balance += fp * o.size - fee + (fp - p.entryPrice) * o.size;
      p.size -= o.size;
      if (p.size < 0.000001) delete acc.positions[sym];
    } else {
      acc.balance -= fee;
      if (!acc.positions[sym]) acc.positions[sym] = { size:0, entryPrice:0, side:'short' };
      const p = acc.positions[sym];
      const tot = p.size + o.size;
      p.entryPrice = (p.size * p.entryPrice + o.size * fp) / tot;
      p.size = tot; p.side = 'short';
    }
  }
  acc.history.push({ symbol:sym, side:o.side, size:o.size, fillPrice:fp, fee, time:Date.now() });
  acc.orders = acc.orders.filter(x => x.id !== o.id);
}

// ══════════════════════════════════════════
// ACCOUNT
// ══════════════════════════════════════════
function getAccount() {
  try { return JSON.parse(localStorage.getItem('account')) || mkAcc(); } catch { return mkAcc(); }
}
function mkAcc() { return { balance:INITIAL_BALANCE, positions:{}, orders:[], history:[] }; }
function saveAccount(a) { localStorage.setItem('account', JSON.stringify(a)); }

// ══════════════════════════════════════════
// UI — Order
// ══════════════════════════════════════════
function togglePriceField() {
  document.getElementById('priceField').style.display =
    document.getElementById('oType').value === 'market' ? 'none' : '';
}

function placeOrder(side) {
  const type  = document.getElementById('oType').value;
  const price = parseFloat(document.getElementById('oPrice').value) || 0;
  const size  = parseFloat(document.getElementById('oSize').value);
  const tp    = parseFloat(document.getElementById('oTp').value) || null;
  const sl    = parseFloat(document.getElementById('oSl').value) || null;
  if (!size||size<=0) { toast('请输入数量',1); return; }
  if (type==='limit'&&price<=0) { toast('请输入价格',1); return; }
  const acc = getAccount();
  const o = { id: Date.now()+Math.random().toString(36).slice(2), symbol:curSym, side, type, price, size, tp, sl, time:Date.now() };
  acc.orders.push(o);
  if (type==='market') {
    const cur = prices[curSym];
    if (cur) fillOrder(acc, o, applySlippage(cur,side,size), TAKER_FEE);
  }
  saveAccount(acc);
  toast(`${side==='buy'?'买单':'卖单'} 已挂 ✓`);
  document.getElementById('oSize').value = '';
}

// ══════════════════════════════════════════
// UI — Account panel
// ══════════════════════════════════════════
function renderAccount() {
  const acc = getAccount();
  let pnl = 0;
  for (const [sym, pos] of Object.entries(acc.positions)) {
    const p = prices[sym] || 0;
    pnl += pos.side==='long' ? (p-pos.entryPrice)*pos.size : (pos.entryPrice-p)*pos.size;
  }
  document.getElementById('statGrid').innerHTML = `
    <div class="stat"><div class="lbl">可用余额</div><div class="val">$${acc.balance.toFixed(2)}</div></div>
    <div class="stat"><div class="lbl">浮动盈亏</div><div class="val ${pnl>=0?'pos':'neg'}">${pnl>=0?'+':''}$${pnl.toFixed(2)}</div></div>
    <div class="stat"><div class="lbl">总权益</div><div class="val">$${(acc.balance+pnl).toFixed(2)}</div></div>
    <div class="stat"><div class="lbl">初始资金</div><div class="val">$${INITIAL_BALANCE.toLocaleString()}</div></div>`;

  document.getElementById('posDiv').innerHTML = Object.keys(acc.positions).length
    ? Object.entries(acc.positions).map(([sym,pos]) => {
        const p = prices[sym]||0;
        const pnl2 = pos.side==='long'?(p-pos.entryPrice)*pos.size:(pos.entryPrice-p)*pos.size;
        return `<div class="pos-row"><b style="color:var(--accent)">${sym}</b>
          <span style="color:var(--muted);margin:0 3px">${pos.side.toUpperCase()}</span>
          ${pos.size.toFixed(4)} @ $${pos.entryPrice.toFixed(2)}
          <span class="${pnl2>=0?'pos':'neg'}" style="float:right">${pnl2>=0?'+':''}$${pnl2.toFixed(2)}</span></div>`;
      }).join('')
    : '<div class="empty">暂无持仓</div>';

  document.getElementById('ordDiv').innerHTML = acc.orders.length
    ? acc.orders.map(o => `<div class="ord-row">
        <div><span style="color:${o.side==='buy'?'var(--green)':'var(--red)'}"><b>${o.side==='buy'?'买':'卖'}</b></span>
        <span style="color:var(--muted);margin:0 3px;font-size:10px">${o.symbol}</span>${o.size}@$${o.price}
        ${o.tp?`<span style="color:var(--green);font-size:9px"> TP:${o.tp}</span>`:''}
        ${o.sl?`<span style="color:var(--red);font-size:9px"> SL:${o.sl}</span>`:''}
        </div><button class="xbtn" onclick="cancelOrder('${o.id}')">撤</button></div>`).join('')
    : '<div class="empty">暂无挂单</div>';
}

function cancelOrder(id) {
  const acc = getAccount();
  acc.orders = acc.orders.filter(o => o.id !== id);
  saveAccount(acc); renderAccount(); toast('订单已撤销');
}

function resetAccount() {
  if (!confirm('确认重置？所有数据清空')) return;
  localStorage.removeItem('account'); toast('账户已重置'); renderAccount();
}

function renderHistory() {
  const acc = getAccount();
  const el = document.getElementById('histDiv');
  if (!acc.history.length) { el.innerHTML='<div class="empty">暂无记录</div>'; return; }
  el.innerHTML = [...acc.history].reverse().slice(0,50).map(h =>
    `<div class="hist-row">
      <span style="color:${h.side==='buy'?'var(--green)':'var(--red)'}">${h.side==='buy'?'买':'卖'}</span>
      <span style="color:var(--muted)">${h.symbol}</span>
      <span>${h.size}</span><span>@$${h.fillPrice.toFixed(2)}</span>
      <span style="color:var(--muted);margin-left:auto">${new Date(h.time).toLocaleTimeString('zh')}</span>
    </div>`).join('');
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
let activeTab = 'order';
function switchTab(name, el) {
  activeTab = name;
  ['order','account','history'].forEach(t => document.getElementById('pane-'+t).style.display = t===name?'':'none');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (name==='account') renderAccount();
  if (name==='history') renderHistory();
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
let toastTimer;
function toast(msg, isErr=0) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.background = isErr?'#da3633':'#1f6feb';
  el.style.display = 'block'; clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.style.display='none', 2500);
}

// auto-refresh account every 3s
setInterval(() => { if (activeTab==='account') renderAccount(); }, 3000);

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════
initChart();
buildSymTabs();
buildTfBar();
loadKlines(curSym, curTf).then(() => connectWS());
</script>
