<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>模拟交易平台</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--sf:#161b22;--bd:#30363d;--tx:#e6edf3;--mu:#8b949e;--ac:#58a6ff;--gn:#3fb950;--rd:#f85149}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
header{background:var(--sf);border-bottom:1px solid var(--bd);padding:6px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.logo{font-size:13px;color:var(--ac);font-weight:700;white-space:nowrap}
.sym-tabs{display:flex;gap:3px;flex-wrap:wrap}
.sym-tab{padding:3px 8px;border-radius:4px;border:1px solid var(--bd);background:var(--bg);color:var(--mu);cursor:pointer;font-size:11px}
.sym-tab.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.price-wrap{margin-left:auto;text-align:right;line-height:1.3}
.live-price{font-size:18px;font-weight:700}
.live-price.up{color:var(--gn)}.live-price.down{color:var(--rd)}
.sub-info{font-size:10px;color:var(--mu)}
.ws-dot{width:7px;height:7px;border-radius:50%;background:var(--rd);display:inline-block}
.ws-dot.on{background:var(--gn)}

/* TF + Indicator bar */
.ctrl-bar{background:var(--sf);border-bottom:1px solid var(--bd);padding:4px 10px;display:flex;gap:4px;align-items:center;flex-shrink:0;overflow-x:auto;white-space:nowrap}
.ctrl-bar::-webkit-scrollbar{height:3px}.ctrl-bar::-webkit-scrollbar-thumb{background:var(--bd)}
.tf-btn,.ind-btn{padding:3px 8px;border-radius:3px;border:none;background:transparent;color:var(--mu);cursor:pointer;font-size:11px;flex-shrink:0}
.tf-btn.active{background:#1f6feb22;color:var(--ac);font-weight:600}
.ind-btn{border:1px solid var(--bd)}
.ind-btn.active{background:#1f6feb33;border-color:var(--ac);color:var(--ac)}
.sep{width:1px;height:16px;background:var(--bd);margin:0 4px;flex-shrink:0}

/* Main layout */
.layout{display:flex;flex:1;overflow:hidden}

/* Draw toolbar */
#draw-tb{display:flex;flex-direction:column;gap:3px;padding:6px 4px;background:var(--sf);border-right:1px solid var(--bd);flex-shrink:0;width:36px;align-items:center}
.dtool{width:28px;height:28px;border:1px solid var(--bd);border-radius:5px;background:transparent;color:var(--mu);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dtool.active{background:#1f6feb33;border-color:var(--ac);color:var(--ac)}
.dtool:hover:not(.active){border-color:var(--mu)}
.dtool-sep{width:24px;height:1px;background:var(--bd);margin:2px 0}

/* Chart area */
#chart-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#main-wrap{flex:1;position:relative;min-height:0}
#main-chart{width:100%;height:100%}
#draw-canvas{position:absolute;top:0;left:0;z-index:5;pointer-events:none}
#sub-wrap{height:150px;flex-shrink:0;border-top:1px solid var(--bd);position:relative}
#sub-chart{width:100%;height:100%}
.sub-label{position:absolute;top:4px;left:8px;font-size:10px;color:var(--mu);z-index:2;pointer-events:none}
.loading-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#0d111788;z-index:20;font-size:12px;color:var(--mu)}

/* Right panel */
.panel{width:280px;background:var(--sf);border-left:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
@media(max-width:700px){
  .layout{flex-direction:column}
  #draw-tb{flex-direction:row;width:100%;border-right:none;border-bottom:1px solid var(--bd);padding:4px;justify-content:center;overflow-x:auto;height:auto}
  #chart-area{height:42vh}
  .panel{width:100%;border-left:none;border-top:1px solid var(--bd);flex:1}
  #sub-wrap{height:120px}
}
.tabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.tab{flex:1;padding:8px;text-align:center;font-size:12px;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.tab-body{flex:1;overflow-y:auto;padding:10px}
.fg{margin-bottom:8px}
label{font-size:11px;color:var(--mu);display:block;margin-bottom:3px}
input,select{width:100%;padding:6px 8px;background:var(--bg);border:1px solid var(--bd);border-radius:5px;color:var(--tx);font-size:12px;outline:none}
input:focus,select:focus{border-color:var(--ac)}
.btn-row{display:flex;gap:6px;margin-top:10px}
.btn{flex:1;padding:8px;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer}
.btn-buy{background:#238636;color:#fff}.btn-sell{background:#da3633;color:#fff}
.btn-sm{width:100%;padding:5px;background:var(--bd);color:var(--mu);border:none;border-radius:4px;cursor:pointer;font-size:11px;margin-top:6px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.stat{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:7px}
.stat .lbl{font-size:10px;color:var(--mu);margin-bottom:2px}
.stat .val{font-size:13px;font-weight:700}
.pos{color:var(--gn)}.neg{color:var(--rd)}
.sec-t{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin:8px 0 4px}
.pos-row,.ord-row{background:var(--bg);border:1px solid var(--bd);border-radius:5px;padding:6px 8px;margin-bottom:4px;font-size:11px}
.ord-row{display:flex;justify-content:space-between;align-items:center}
.xbtn{background:none;border:1px solid var(--rd);color:var(--rd);border-radius:3px;padding:1px 5px;cursor:pointer;font-size:10px}
.empty{color:var(--mu);font-size:12px;text-align:center;padding:12px 0}
.hist-row{font-size:11px;padding:4px 0;border-bottom:1px solid #21262d;display:flex;gap:5px;align-items:center}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:7px 14px;border-radius:6px;font-size:12px;display:none;z-index:999;color:#fff;white-space:nowrap}

/* MA settings popup */
#ma-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:16px;z-index:100;display:none;width:220px}
#ma-popup h3{font-size:13px;margin-bottom:12px;color:var(--ac)}
#ma-popup .ma-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
#ma-popup .ma-row label{width:50px;font-size:11px;color:var(--mu)}
#ma-popup .ma-row input{flex:1;padding:4px 6px}
#ma-popup .ma-row input[type=color]{padding:0;width:32px;height:24px;cursor:pointer;border:none;background:none}
.popup-btn{padding:5px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px}
.popup-ok{background:#1f6feb;color:#fff}.popup-cl{background:var(--bd);color:var(--mu)}
</style>
</head>
<body>

<header>
  <div class="logo">📈 模拟交易</div>
  <div class="sym-tabs" id="symTabs"></div>
  <div class="price-wrap">
    <span class="ws-dot" id="wsDot"></span>
    <span class="live-price" id="livePrice">--</span><br>
    <span class="sub-info" id="subInfo">连接中...</span>
  </div>
</header>

<div class="ctrl-bar" id="ctrlBar"></div>

<div class="layout">

  <!-- 画图工具栏 -->
  <div id="draw-tb">
    <button class="dtool active" data-tool="cursor" title="光标" onclick="setTool(this)">⊹</button>
    <div class="dtool-sep"></div>
    <button class="dtool" data-tool="hline"    title="水平线"   onclick="setTool(this)">—</button>
    <button class="dtool" data-tool="vline"    title="垂直线"   onclick="setTool(this)">|</button>
    <button class="dtool" data-tool="trend"    title="趋势线"   onclick="setTool(this)">╱</button>
    <button class="dtool" data-tool="ray"      title="射线"     onclick="setTool(this)">→</button>
    <button class="dtool" data-tool="hray"     title="水平射线" onclick="setTool(this)">↦</button>
    <div class="dtool-sep"></div>
    <button class="dtool" data-tool="rect"     title="矩形"     onclick="setTool(this)">▭</button>
    <button class="dtool" data-tool="fib"      title="斐波那契" onclick="setTool(this)">φ</button>
    <div class="dtool-sep"></div>
    <button class="dtool" id="undoBtn"  title="撤销" onclick="undoDrawing()">↩</button>
    <button class="dtool" id="clearBtn" title="清空" onclick="clearDrawings()">🗑</button>
  </div>

  <div id="chart-area">
    <div id="main-wrap">
      <div id="main-chart"></div>
      <canvas id="draw-canvas"></canvas>
      <div class="loading-overlay" id="loadingOverlay">加载K线...</div>
    </div>
    <div id="sub-wrap" style="display:none">
      <div class="sub-label" id="subLabel">RSI(14)</div>
      <div id="sub-chart"></div>
    </div>
  </div>

  <div class="panel">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('order',this)">下单</div>
      <div class="tab" onclick="switchTab('account',this)">账户</div>
      <div class="tab" onclick="switchTab('history',this)">记录</div>
    </div>
    <div class="tab-body" id="pane-order">
      <div class="fg"><label>类型</label>
        <select id="oType" onchange="togglePF()">
          <option value="limit">限价单</option>
          <option value="market">市价单</option>
        </select></div>
      <div class="fg" id="priceField"><label>价格</label><input id="oPrice" type="number" placeholder="挂单价" step="0.01"></div>
      <div class="fg"><label>数量</label><input id="oSize" type="number" placeholder="0.001" step="0.001"></div>
      <div class="fg"><label>止盈（可选）</label><input id="oTp" type="number" placeholder="触达自动平仓" step="0.01"></div>
      <div class="fg"><label>止损（可选）</label><input id="oSl" type="number" placeholder="触达止损" step="0.01"></div>
      <div class="btn-row">
        <button class="btn btn-buy"  onclick="placeOrder('buy')">买/做多</button>
        <button class="btn btn-sell" onclick="placeOrder('sell')">卖/做空</button>
      </div>
      <button class="btn-sm" onclick="resetAccount()">⚠ 重置账户</button>
    </div>
    <div class="tab-body" id="pane-account" style="display:none">
      <div class="stat-grid" id="statGrid"></div>
      <div class="sec-t">持仓</div><div id="posDiv"></div>
      <div class="sec-t">挂单</div><div id="ordDiv"></div>
    </div>
    <div class="tab-body" id="pane-history" style="display:none">
      <div id="histDiv"></div>
    </div>
  </div>
</div>

<!-- MA设置弹窗 -->
<div id="ma-popup">
  <h3>⚙ MA 设置</h3>
  <div class="ma-row"><label>MA1</label><input id="ma1p" type="number" value="7" min="1"><input id="ma1c" type="color" value="#f6c90e"></div>
  <div class="ma-row"><label>MA2</label><input id="ma2p" type="number" value="25" min="1"><input id="ma2c" type="color" value="#2962ff"></div>
  <div class="ma-row"><label>MA3</label><input id="ma3p" type="number" value="99" min="1"><input id="ma3c" type="color" value="#ff6d00"></div>
  <div style="display:flex;gap:8px;margin-top:10px">
    <button class="popup-btn popup-ok" onclick="applyMA()">应用</button>
    <button class="popup-btn popup-cl" onclick="closeMAPopup()">关闭</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const SYMBOLS  = ['BTCUSDC','BTCUSDT','ETHUSDC','ETHUSDT','SOLUSDT','BNBUSDT'];
const TIMEFRAMES = [
  {l:'1分',v:'1m'},{l:'3分',v:'3m'},{l:'5分',v:'5m'},{l:'15分',v:'15m'},
  {l:'30分',v:'30m'},{l:'1时',v:'1h'},{l:'2时',v:'2h'},{l:'4时',v:'4h'},
  {l:'8时',v:'8h'},{l:'日线',v:'1d'},{l:'周线',v:'1w'},
];
const INDICATORS = [
  {id:'ma',  label:'MA'},
  {id:'ema', label:'EMA'},
  {id:'boll',label:'BOLL'},
  {id:'vol', label:'成交量'},
  {id:'rsi', label:'RSI'},
  {id:'macd',label:'MACD'},
  {id:'kdj', label:'KDJ'},
  {id:'wr',  label:'WR'},
];
const INITIAL_BALANCE = 100_000;
const TAKER_FEE=0.0005, MAKER_FEE=0.0002, SLIPPAGE=0.0005;

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let curSym='BTCUSDC', curTf='1m';
let prices={}, prevPrices={};
let ws, activeIndicators=new Set(['ma','vol']);
let mainChart, candleSeries, subChart, subSeries={};
let indSeries={};
let chartData=[]; // current symbol full data
let currentTool='cursor';
let drawings=[], drawingInProgress=null;
let activeTab='order';

// MA settings
let maSettings=[
  {period:7,  color:'#f6c90e'},
  {period:25, color:'#2962ff'},
  {period:99, color:'#ff6d00'},
];

// ═══════════════════════════════════════════════════════════
// CHART INIT
// ═══════════════════════════════════════════════════════════
function initCharts() {
  const mWrap = document.getElementById('main-wrap');
  mainChart = LightweightCharts.createChart(document.getElementById('main-chart'), {
    layout:{background:{color:'#0d1117'},textColor:'#8b949e'},
    grid:{vertLines:{color:'#21262d'},horzLines:{color:'#21262d'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    timeScale:{timeVisible:true,secondsVisible:false,borderColor:'#30363d'},
    rightPriceScale:{borderColor:'#30363d'},
  });
  candleSeries = mainChart.addCandlestickSeries({
    upColor:'#3fb950',downColor:'#f85149',
    borderUpColor:'#3fb950',borderDownColor:'#f85149',
    wickUpColor:'#3fb950',wickDownColor:'#f85149',
  });

  // sub chart
  subChart = LightweightCharts.createChart(document.getElementById('sub-chart'), {
    layout:{background:{color:'#0d1117'},textColor:'#8b949e'},
    grid:{vertLines:{color:'#21262d'},horzLines:{color:'#21262d'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    timeScale:{visible:false,borderColor:'#30363d'},
    rightPriceScale:{borderColor:'#30363d'},
    leftPriceScale:{visible:false},
  });

  // sync time scales
  let syncing=false;
  mainChart.timeScale().subscribeVisibleLogicalRangeChange(r=>{
    if(syncing||!r)return; syncing=true;
    subChart.timeScale().setVisibleLogicalRange(r);
    syncing=false; redrawCanvas();
  });
  subChart.timeScale().subscribeVisibleLogicalRangeChange(r=>{
    if(syncing||!r)return; syncing=true;
    mainChart.timeScale().setVisibleLogicalRange(r);
    syncing=false;
  });
  mainChart.subscribeCrosshairMove(()=>redrawCanvas());

  // resize
  new ResizeObserver(()=>{
    const mw=document.getElementById('main-wrap');
    mainChart.resize(mw.clientWidth, mw.clientHeight);
    const sw=document.getElementById('sub-wrap');
    if(sw.style.display!=='none') subChart.resize(sw.clientWidth, sw.clientHeight);
    resizeCanvas(); redrawCanvas();
  }).observe(document.getElementById('chart-area'));
}

// ═══════════════════════════════════════════════════════════
// INDICATORS CALC
// ═══════════════════════════════════════════════════════════
function calcMA(data,period){
  const r=[];
  for(let i=period-1;i<data.length;i++){
    let s=0; for(let j=0;j<period;j++) s+=data[i-j].close;
    r.push({time:data[i].time,value:s/period});
  }
  return r;
}
function calcEMA(data,period){
  if(data.length<period) return [];
  const k=2/(period+1); const r=[];
  let ema=0; for(let i=0;i<period;i++) ema+=data[i].close; ema/=period;
  r.push({time:data[period-1].time,value:ema,close:ema});
  for(let i=period;i<data.length;i++){
    ema=data[i].close*k+ema*(1-k);
    r.push({time:data[i].time,value:ema,close:ema});
  }
  return r;
}
function calcBOLL(data,period=20,mult=2){
  const u=[],m=[],l=[];
  for(let i=period-1;i<data.length;i++){
    const sl=data.slice(i-period+1,i+1).map(x=>x.close);
    const mean=sl.reduce((a,b)=>a+b,0)/period;
    const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mean)**2,0)/period);
    u.push({time:data[i].time,value:mean+mult*std});
    m.push({time:data[i].time,value:mean});
    l.push({time:data[i].time,value:mean-mult*std});
  }
  return {u,m,l};
}
function calcRSI(data,period=14){
  if(data.length<period+1) return [];
  const r=[]; let ag=0,al=0;
  for(let i=1;i<=period;i++){const d=data[i].close-data[i-1].close; d>0?ag+=d:al-=d;}
  ag/=period; al/=period;
  r.push({time:data[period].time,value:al===0?100:100-100/(1+ag/al)});
  for(let i=period+1;i<data.length;i++){
    const d=data[i].close-data[i-1].close;
    ag=(ag*(period-1)+Math.max(0,d))/period;
    al=(al*(period-1)+Math.max(0,-d))/period;
    r.push({time:data[i].time,value:al===0?100:100-100/(1+ag/al)});
  }
  return r;
}
function calcMACD(data,fast=12,slow=26,sig=9){
  const ef=calcEMA(data,fast), es=calcEMA(data,slow);
  const off=slow-fast;
  const macd=ef.slice(off).map((d,i)=>({time:d.time,value:d.value-es[i].value,close:d.value-es[i].value}));
  const signal=calcEMA(macd,sig);
  const sm={}; signal.forEach(d=>sm[d.time]=d.value);
  const hist=macd.slice(sig-1).map((d,i)=>({time:d.time,value:d.value-(sm[d.time]||0)}));
  return {macd,signal,hist};
}
function calcKDJ(data,period=9){
  const K=[],D=[],J=[]; let k=50,d=50;
  for(let i=period-1;i<data.length;i++){
    const sl=data.slice(i-period+1,i+1);
    const hi=Math.max(...sl.map(x=>x.high)), lo=Math.min(...sl.map(x=>x.low));
    const rsv=hi===lo?50:(data[i].close-lo)/(hi-lo)*100;
    k=k*2/3+rsv/3; d=d*2/3+k/3; const j=3*k-2*d;
    K.push({time:data[i].time,value:k});
    D.push({time:data[i].time,value:d});
    J.push({time:data[i].time,value:j});
  }
  return {K,D,J};
}
function calcWR(data,period=14){
  const r=[];
  for(let i=period-1;i<data.length;i++){
    const sl=data.slice(i-period+1,i+1);
    const hi=Math.max(...sl.map(x=>x.high)), lo=Math.min(...sl.map(x=>x.low));
    const wr=hi===lo?-50:-(hi-data[i].close)/(hi-lo)*100;
    r.push({time:data[i].time,value:wr});
  }
  return r;
}

// ═══════════════════════════════════════════════════════════
// INDICATOR RENDERING
// ═══════════════════════════════════════════════════════════
function clearIndSeries(){
  Object.values(indSeries).flat().forEach(s=>{ try{mainChart.removeSeries(s)}catch{} });
  Object.values(subSeries).flat().forEach(s=>{ try{subChart.removeSeries(s)}catch{} });
  indSeries={}; subSeries={};
}

function renderIndicators(data){
  clearIndSeries();
  if(!data.length) return;

  if(activeIndicators.has('ma')){
    indSeries.ma = maSettings.map(cfg=>{
      const s=mainChart.addLineSeries({color:cfg.color,lineWidth:1,priceLineVisible:false,lastValueVisible:false});
      s.setData(calcMA(data,cfg.period));
      return s;
    });
  }

  if(activeIndicators.has('ema')){
    indSeries.ema=[];
    [[12,'#9c27b0'],[26,'#ff9800']].forEach(([p,c])=>{
      const s=mainChart.addLineSeries({color:c,lineWidth:1,priceLineVisible:false,lastValueVisible:false});
      s.setData(calcEMA(data,p)); indSeries.ema.push(s);
    });
  }

  if(activeIndicators.has('boll')){
    const b=calcBOLL(data);
    indSeries.boll=[];
    [{d:b.u,c:'#ff5722'},{d:b.m,c:'#9c27b0'},{d:b.l,c:'#2196f3'}].forEach(({d,c})=>{
      const s=mainChart.addLineSeries({color:c,lineWidth:1,priceLineVisible:false,lastValueVisible:false});
      s.setData(d); indSeries.boll.push(s);
    });
  }

  if(activeIndicators.has('vol')){
    const volData=data.map(d=>({time:d.time,value:d.volume||1,color:d.close>=d.open?'#3fb95066':'#f8514966'}));
    const vs=mainChart.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:'vol',lastValueVisible:false});
    vs.priceScale().applyOptions({scaleMargins:{top:0.85,bottom:0}});
    vs.setData(volData);
    indSeries.vol=[vs];
  }

  // SUB CHART indicators
  const showSub = activeIndicators.has('rsi')||activeIndicators.has('macd')||activeIndicators.has('kdj')||activeIndicators.has('wr');
  const subWrap=document.getElementById('sub-wrap');
  if(showSub){
    subWrap.style.display='';
    // pick first active sub indicator
    if(activeIndicators.has('rsi')){
      document.getElementById('subLabel').textContent='RSI(14)';
      const rs=calcRSI(data);
      const s=subChart.addLineSeries({color:'#e040fb',lineWidth:1,priceLineVisible:false,lastValueVisible:true});
      s.setData(rs); subSeries.rsi=[s];
      // overbought/oversold lines
      [70,30].forEach(v=>{

      ms.setData(mc.macd);

        s.setData(d); (subSeries.kdj=subSeries.kdj||[]).push(s);
      });

// ═══════════════════════════════════════════════════════════
// KLINES LOAD
// ═══════════════════════════════════════════════════════════
function getStartTime(iv){
  const DAY=86400000, now=Date.now();
  const map={'1m':7,'3m':21,'5m':30,'15m':90,'30m':180,'1h':365,'2h':365,'4h':365,'8h':365};
  const days=map[iv]; if(!days) return 1498867200000;
  return now-days*DAY;
}
async function loadKlines(sym,iv){
  const ov=document.getElementById('loadingOverlay');
  ov.textContent='加载K线...'; ov.style.display='flex';
  const all=[];
  let start=getStartTime(iv), batchCount=0;
  try{
    while(start<Date.now()){
      const url=`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${iv}&startTime=${start}&limit=1000`;
      const res=await fetch(url); if(!res.ok) break;
      const raw=await res.json(); if(!raw.length) break;
      for(const k of raw) all.push({time:Math.floor(k[0]/1000),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]});
      const last=raw[raw.length-1]; start=last[6]+1; batchCount++;
      ov.textContent=`加载中... ${all.length} 根`;
      if(raw.length<1000) break;
      if(batchCount%5===0) await sleep(300);
    }
    const seen=new Set();
    chartData=all.filter(c=>{if(seen.has(c.time))return false;seen.add(c.time);return true}).sort((a,b)=>a.time-b.time);
    candleSeries.setData(chartData);
    mainChart.timeScale().fitContent();
    if(chartData.length){ prices[sym]=chartData[chartData.length-1].close; updatePriceDisplay(sym,prices[sym]); }
    renderIndicators(chartData);
    ov.textContent=`✓ ${chartData.length}根`;
    setTimeout(()=>ov.style.display='none',700);
  } catch(e){ console.error(e); ov.textContent='加载失败'; setTimeout(()=>ov.style.display='none',2000); }
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// WEBSOCKET
// ═══════════════════════════════════════════════════════════
function connectWS(){
  if(ws){ws.onclose=null;ws.close();}
  const sl=curSym.toLowerCase();
  const streams=[...SYMBOLS.map(s=>`${s.toLowerCase()}@ticker`),`${sl}@kline_${curTf}`].join('/');
  ws=new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams}`);
  ws.onopen=()=>document.getElementById('wsDot').className='ws-dot on';
  ws.onclose=()=>{document.getElementById('wsDot').className='ws-dot';setTimeout(connectWS,2000);};
  ws.onerror=()=>ws.close();
  ws.onmessage=(e)=>{
    const msg=JSON.parse(e.data), d=msg.data||{}, stream=msg.stream||'';
    if(stream.includes('@ticker')){
      const sym=d.s, price=+d.c;
      prevPrices[sym]=prices[sym]; prices[sym]=price;
      checkOrders(sym,price,price,price);
      if(sym===curSym) updatePriceDisplay(sym,price);
    }
    if(stream.includes('@kline')){
      const k=d.k;
      const candle={time:Math.floor(k.t/1000),open:+k.o,high:+k.h,low:+k.l,close:+k.c,volume:+k.v};
      if(k.s===curSym&&k.i===curTf){
        candleSeries.update(candle);
        // update last candle in chartData for live indicator update
        if(chartData.length&&chartData[chartData.length-1].time===candle.time){
          chartData[chartData.length-1]=candle;
        } else if(candle.time>(chartData[chartData.length-1]||{}).time){
          chartData.push(candle);
        }
        checkOrders(k.s,+k.c,+k.h,+k.l);
      }
    }
  };
}
function updatePriceDisplay(sym,price){
  const prev=prevPrices[sym], el=document.getElementById('livePrice');
  el.textContent='$'+price.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  el.className='live-price'+(prev&&price>prev?' up':prev&&price<prev?' down':'');
  document.getElementById('subInfo').textContent=sym+' · 实时';
}

// DRAWING TOOLS (Canvas overlay)
// ═══════════════════════════════════════════════════════════
let canvas, ctx;
function initCanvas(){
  canvas=document.getElementById('draw-canvas');
  ctx=canvas.getContext('2d');
  resizeCanvas();

  // mouse events
  canvas.addEventListener('mousedown', e=>onDown(e.offsetX,e.offsetY));
  canvas.addEventListener('mousemove', e=>onMove(e.offsetX,e.offsetY));
  canvas.addEventListener('mouseup',   e=>onUp(e.offsetX,e.offsetY));
  // touch events
  canvas.addEventListener('touchstart',e=>{const t=e.touches[0],r=canvas.getBoundingClientRect();onDown(t.clientX-r.left,t.clientY-r.top);e.preventDefault();},{passive:false});
  canvas.addEventListener('touchmove', e=>{const t=e.touches[0],r=canvas.getBoundingClientRect();onMove(t.clientX-r.left,t.clientY-r.top);e.preventDefault();},{passive:false});
  canvas.addEventListener('touchend',  e=>{const t=e.changedTouches[0],r=canvas.getBoundingClientRect();onUp(t.clientX-r.left,t.clientY-r.top);},{passive:false});
}
function resizeCanvas(){
  const w=document.getElementById('main-wrap');
  canvas.width=w.clientWidth; canvas.height=w.clientHeight;
}
function setTool(btn){
  currentTool=btn.dataset.tool; drawingInProgress=null;
  document.querySelectorAll('.dtool[data-tool]').forEach(b=>b.classList.toggle('active',b===btn));
  canvas.style.pointerEvents=currentTool==='cursor'?'none':'auto';
  canvas.style.cursor=currentTool==='cursor'?'default':'crosshair';
}
function getChartCoord(px,py){
  const price=candleSeries.coordinateToPrice(py);
  const time=mainChart.timeScale().coordinateToTime(px);
  return {px,py,price,time};
}
function toScreen(time,price){
  const x=mainChart.timeScale().timeToCoordinate(time);
  const y=candleSeries.priceToCoordinate(price);
  return {x,y};
}
function onDown(px,py){
  const coord=getChartCoord(px,py);
  if(currentTool==='hline'){
    drawings.push({type:'hline',price:coord.price}); redrawCanvas(); return;
  }
  if(currentTool==='vline'){
    drawings.push({type:'vline',time:coord.time,px}); redrawCanvas(); return;
  }
  if(['trend','ray','fib','rect','hray'].includes(currentTool)){
    if(!drawingInProgress){
      drawingInProgress={type:currentTool,start:coord,end:coord};
    }
  }
}
function onMove(px,py){
  if(!drawingInProgress) return;
  drawingInProgress.end=getChartCoord(px,py);
  redrawCanvas();
}
function onUp(px,py){
  if(!drawingInProgress) return;
  drawingInProgress.end=getChartCoord(px,py);
  drawings.push({...drawingInProgress}); drawingInProgress=null; redrawCanvas();
}
function undoDrawing(){ drawings.pop(); redrawCanvas(); }
function clearDrawings(){ drawings=[]; drawingInProgress=null; redrawCanvas(); }

const FIB_LEVELS=[0,0.236,0.382,0.5,0.618,0.786,1];
const FIB_COLORS=['#f6c90e','#2196f3','#4caf50','#ff9800','#e91e63','#9c27b0','#f6c90e'];

function redrawCanvas(){
  if(!ctx) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.lineWidth=1.5;

  const all=[...drawings, drawingInProgress].filter(Boolean);
  for(const d of all){
    ctx.strokeStyle='#58a6ff'; ctx.fillStyle='#58a6ff88';
    ctx.setLineDash([]);
    if(d.type==='hline'){
      const y=candleSeries.priceToCoordinate(d.price);
      if(y==null) continue;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y);
      ctx.stroke();
      ctx.fillStyle='#58a6ff'; ctx.font='10px Segoe UI';
      ctx.fillText(d.price?.toFixed(2),4,y-3);
    }
    else if(d.type==='vline'){
      const x=mainChart.timeScale().timeToCoordinate(d.time);
      if(x==null) continue;
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
    }
    else if(d.type==='hray'){
      const y=candleSeries.priceToCoordinate(d.start.price);
      const x=mainChart.timeScale().timeToCoordinate(d.start.time);
      if(y==null||x==null) continue;
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(canvas.width,y); ctx.stroke();
    }
    else if(d.type==='trend'||d.type==='ray'){
      const s=toScreen(d.start.time,d.start.price);
      const e=toScreen(d.end.time,d.end.price);
      if(s.x==null||e.x==null) continue;
      ctx.beginPath(); ctx.moveTo(s.x,s.y);
      if(d.type==='ray'){
        // extend to edge
        const dx=e.x-s.x, dy=e.y-s.y;
        const t=(canvas.width-s.x)/dx;
        ctx.lineTo(s.x+dx*t, s.y+dy*t);
      } else { ctx.lineTo(e.x,e.y); }
      ctx.stroke();
      // dots
      ctx.beginPath(); ctx.arc(s.x,s.y,3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(e.x,e.y,3,0,Math.PI*2); ctx.fill();
    }
    else if(d.type==='rect'){
      const s=toScreen(d.start.time,d.start.price);
      const e=toScreen(d.end.time,d.end.price);
      if(s.x==null||e.x==null) continue;
      ctx.fillStyle='#58a6ff15';
      ctx.fillRect(s.x,s.y,e.x-s.x,e.y-s.y);
      ctx.strokeRect(s.x,s.y,e.x-s.x,e.y-s.y);
    }
    else if(d.type==='fib'){
      const minP=Math.min(d.start.price,d.end.price);
      const maxP=Math.max(d.start.price,d.end.price);
      const sx=Math.min(mainChart.timeScale().timeToCoordinate(d.start.time),mainChart.timeScale().timeToCoordinate(d.end.time));
      const ex=Math.max(mainChart.timeScale().timeToCoordinate(d.start.time),mainChart.timeScale().timeToCoordinate(d.end.time));
      if(sx==null||ex==null) continue;
      FIB_LEVELS.forEach((lvl,i)=>{
        const price=maxP-(maxP-minP)*lvl;
        const y=candleSeries.priceToCoordinate(price);
        if(y==null) return;
        ctx.strokeStyle=FIB_COLORS[i]; ctx.setLineDash([4,3]);
        ctx.beginPath(); ctx.moveTo(sx,y); ctx.lineTo(ex,y); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle=FIB_COLORS[i]; ctx.font='10px Segoe UI';
        ctx.fillText(`${(lvl*100).toFixed(1)}%  ${price.toFixed(2)}`,ex+4,y+4);
      });
    }
  }
}

// ═══════════════════════════════════════════════════════════
// MATCHING ENGINE
// ═══════════════════════════════════════════════════════════
function applySlippage(price,side,size){const i=SLIPPAGE+(size/10)*0.0001;return side==='buy'?price*(1+i):price*(1-i);}
function checkOrders(sym,price,high,low){
  const acc=getAccount(); let changed=false; const toFill=[];
  for(const o of acc.orders){
    if(o.symbol!==sym) continue;
    if(o.type==='limit'){
      if(o.side==='buy'&&low<=o.price)  toFill.push({o,fp:applySlippage(o.price,'buy',o.size),fee:MAKER_FEE});
      if(o.side==='sell'&&high>=o.price) toFill.push({o,fp:applySlippage(o.price,'sell',o.size),fee:MAKER_FEE});
    } else toFill.push({o,fp:applySlippage(price,o.side,o.size),fee:TAKER_FEE});
    if(o.tp){const tp=o.tp;if((o.side==='buy'&&high>=tp)||(o.side==='sell'&&low<=tp)){const co={...o,side:o.side==='buy'?'sell':'buy',price:tp,type:'limit',tp:null,sl:null};toFill.push({o:co,fp:tp,fee:MAKER_FEE,closeOf:o.id});}}
    if(o.sl){const sl=o.sl;if((o.side==='buy'&&low<=sl)||(o.side==='sell'&&high>=sl)){const co={...o,side:o.side==='buy'?'sell':'buy',price:sl,type:'market',tp:null,sl:null};toFill.push({o:co,fp:applySlippage(sl,co.side,o.size),fee:TAKER_FEE,closeOf:o.id});}}
  }
  for(const{o,fp,fee,closeOf}of toFill){fillOrder(acc,o,fp,fee);if(closeOf)acc.orders=acc.orders.filter(x=>x.id!==closeOf);changed=true;toast(`${o.side==='buy'?'✅买入':'🔴卖出'} ${o.symbol} ${o.size} @ $${fp.toFixed(2)}`);}
  if(changed){saveAccount(acc);if(activeTab==='account')renderAccount();}
}
function fillOrder(acc,o,fp,feeRate){
  const cost=fp*o.size,fee=cost*feeRate,sym=o.symbol;
  if(o.side==='buy'){
    acc.balance-=cost+fee;
    if(!acc.positions[sym])acc.positions[sym]={size:0,entryPrice:0,side:'long'};
    const p=acc.positions[sym];const tot=p.size+o.size;
    p.entryPrice=(p.size*p.entryPrice+o.size*fp)/tot;p.size=tot;p.side='long';
  } else {
    if(acc.positions[sym]?.size>0){
      const p=acc.positions[sym];
      acc.balance+=fp*o.size-fee+(fp-p.entryPrice)*o.size;
      p.size-=o.size;if(p.size<0.000001)delete acc.positions[sym];
    } else {
      acc.balance-=fee;
      if(!acc.positions[sym])acc.positions[sym]={size:0,entryPrice:0,side:'short'};
      const p=acc.positions[sym];const tot=p.size+o.size;
      p.entryPrice=(p.size*p.entryPrice+o.size*fp)/tot;p.size=tot;p.side='short';
    }
  }
  acc.history.push({symbol:sym,side:o.side,size:o.size,fillPrice:fp,fee,time:Date.now()});
  acc.orders=acc.orders.filter(x=>x.id!==o.id);
}

function switchTab(name,el){
  activeTab=name;
  ['order','account','history'].forEach(t=>document.getElementById('pane-'+t).style.display=t===name?'':'none');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(name==='account')renderAccount();
  if(name==='history')renderHistory();
}
let toastTimer;
function toast(msg,isErr=0){const el=document.getElementById('toast');el.textContent=msg;el.style.background=isErr?'#da3633':'#1f6feb';el.style.display='block';clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.style.display='none',2500);}
setInterval(()=>{if(activeTab==='account')renderAccount();},3000);

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
initCharts();
initCanvas();
buildSymTabs();
buildCtrlBar();
loadKlines(curSym,curTf).then(()=>connectWS());
// set cursor tool (canvas pointer-events off by default)
canvas.style.pointerEvents='none';
</script>
